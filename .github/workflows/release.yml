name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS app
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install standalone Python 3.11
        run: uv python install 3.11

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            desktop/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Build desktop app
        run: ./rebuild.sh desktop --fresh-venv

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: AgentPod-${{ github.ref_name }}
          path: dist/AgentPod_*.dmg
          if-no-files-found: error

  release:
    name: Release
    needs: build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: AgentPod-${{ github.ref_name }}

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current --strip all
        env:
          OUTPUT: RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: AgentPod_*.dmg
          body_path: RELEASE_NOTES.md
          fail_on_unmatched_files: true

  update-homebrew-tap:
    name: Update Homebrew Tap
    needs: release
    runs-on: ubuntu-latest
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Check tap token
        id: token
        run: |
          if [ -z "${HOMEBREW_TAP_TOKEN}" ]; then
            echo "run_update=false" >> "${GITHUB_OUTPUT}"
            echo "HOMEBREW_TAP_TOKEN is empty, skip tap update."
          else
            echo "run_update=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Download artifact
        if: ${{ steps.token.outputs.run_update == 'true' }}
        uses: actions/download-artifact@v8
        with:
          name: AgentPod-${{ github.ref_name }}

      - name: Compute version and SHA256
        if: ${{ steps.token.outputs.run_update == 'true' }}
        id: vars
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          DMG_NAME="AgentPod_${VERSION}_macos-arm64.dmg"
          SHA256="$(shasum -a 256 "${DMG_NAME}" | awk '{print $1}')"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "sha256=${SHA256}" >> "${GITHUB_OUTPUT}"

      - name: Checkout tap repository
        if: ${{ steps.token.outputs.run_update == 'true' }}
        run: |
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/sha2kyou/homebrew-tap.git" tap

      - name: Update cask file
        if: ${{ steps.token.outputs.run_update == 'true' }}
        run: |
          cat > tap/Casks/agentpod.rb <<EOF
          cask "agentpod" do
            version "${{ steps.vars.outputs.version }}"
            sha256 "${{ steps.vars.outputs.sha256 }}"

            url "https://github.com/sha2kyou/agentpod/releases/download/v#{version}/AgentPod_#{version}_macos-arm64.dmg",
                verified: "github.com/sha2kyou/agentpod/"
            name "AgentPod"
            desc "macOS desktop AI agent with chat, skills, MCP, and memory"
            homepage "https://github.com/sha2kyou/agentpod"

            auto_updates true
            app "AgentPod.app"

            postflight do
              app_path = "#{appdir}/AgentPod.app"
              next unless File.exist?(app_path)

              system_command "/usr/bin/xattr",
                             args: ["-dr", "com.apple.quarantine", app_path],
                             must_succeed: false
            end

            zap trash: [
              "~/.agentpod",
              "~/Library/Preferences/com.agentpod.desktop.plist",
              "~/Library/Saved Application State/com.agentpod.desktop.savedState",
            ]
          end
          EOF

      - name: Commit and push tap changes
        if: ${{ steps.token.outputs.run_update == 'true' }}
        env:
          TAP_REPO: sha2kyou/homebrew-tap
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/agentpod.rb
          if git diff --cached --quiet; then
            echo "No tap changes to commit."
            exit 0
          fi
          git commit -m "chore(cask): update agentpod for ${GITHUB_REF_NAME}"
          git push "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/${TAP_REPO}.git" HEAD:main
